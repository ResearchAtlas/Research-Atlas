<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="atlasGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- Subtle Ambient Glow -->
  <circle cx="0" cy="630" r="500" fill="url(#atlasGradient)" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1200" cy="0" r="400" fill="url(#atlasGradient)" opacity="0.1" filter="url(#glow)"/>

  <!-- Content Group -->
  <!-- 
       Total Available Width: 1200
       Left Margin: 100
       Logo Width: ~200 (scale 2.5 * 80? No radius 40 -> diam 80. scale 2.5 -> 200px)
       Gap: 60
       Text Start X: 100 + 200 + 60 = 360
       Available Text Width: 1200 - 360 - 100 (Right Margin) = 740px
  -->
  
  <g transform="translate(0, 315)">
    <!-- Logo Section -->
    <!-- Center of logo is at x=200 relative to previous group. 
         Let's put center at x=200 absolute? No.
         We want left edge at 100. Radius is 100 (40*2.5). So Center X = 100 + 100 = 200.
    -->
    <g transform="translate(200, 0)"> 
         <g transform="scale(2.5) translate(-64, -64)">
            <circle cx="64" cy="64" r="40" fill="none" stroke="url(#atlasGradient)" stroke-width="8"/>
            <path d="M24 64h80" stroke="url(#atlasGradient)" stroke-width="6" stroke-linecap="round"/>
            <path d="M64 24c12 10 18 25 18 40s-6 30-18 40c-12-10-18-25-18-40s6-30 18-40z" fill="none" stroke="#e2e8f0" stroke-width="4"/>
         </g>
    </g>

    <!-- Text Section -->
    <!-- Text starts at x=360 -->
    <g transform="translate(360, 0)">
        <text x="0" y="-25" font-family="'Inter', sans-serif" font-size="72" font-weight="bold" fill="#f8fafc" text-anchor="start" dominant-baseline="middle">Research Atlas</text>
        <text x="0" y="55" font-family="'Inter', sans-serif" font-size="30" font-weight="400" fill="#94a3b8" text-anchor="start" dominant-baseline="middle">AI Prompts &amp; Workflows for Academic Research</text>
        <text x="0" y="125" font-family="'Inter', sans-serif" font-size="24" font-weight="500" fill="#2563eb" text-anchor="start" dominant-baseline="middle">researchatlas.info</text>
    </g>
  </g>
</svg>
